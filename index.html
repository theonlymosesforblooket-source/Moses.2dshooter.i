<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Zombie Arena Open World</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- UPGRADE / LEVEL‑UP PANEL -->
    <div id="ui-overlay">
        <h1 id="menu-title">UPGRADE</h1>
        <p id="menu-text">SELECT TRAIT UPGRADE:</p>
        <div id="trait-buttons">
            <button class="btn" data-trait="power">POWER (+BULLETS)</button>
            <button class="btn" data-trait="agility">AGILITY (FASTER RELOAD)</button>
            <button class="btn" data-trait="mobility">MOBILITY (MOVE SPEED)</button>
            <button class="btn" data-trait="control">CONTROL (TIGHTER SPREAD)</button>
            <button class="btn" data-trait="durability">DURABILITY (+HITS)</button>
        </div>
        <div id="class-buttons" style="display:none;">
            <button class="btn" data-class="shotgun">SHOTGUNNER</button>
            <button class="btn" data-class="sniper">SNIPER</button>
            <button class="btn" data-class="machine">MACHINE GUNNER</button>
        </div>
    </div>

    <!-- HUD -->
    <div id="hud"></div>

    <!-- DEBUG STATS MENU -->
    <div id="debug-menu">
        <h2>DEBUG STATS</h2>
        <label>Move Speed:
            <input id="dbg-speed" type="number" step="0.5">
        </label>
        <label>Reload (ms):
            <input id="dbg-reload" type="number" step="50">
        </label>
        <label>Bullets per Shot:
            <input id="dbg-bullets" type="number" step="1">
        </label>
        <label>Max Hits:
            <input id="dbg-health" type="number" step="1">
        </label>
        <label>Spread:
            <input id="dbg-spread" type="number" step="0.02">
        </label>
        <button id="dbg-apply" class="btn">APPLY</button>
        <button id="dbg-close" class="btn" style="background:#444;">CLOSE</button>
    </div>

    <!-- GAME CANVAS -->
    <canvas id="game"></canvas>

    <!-- LOAD JAVASCRIPT LAST -->
    <script src="game.js"></script>
</body>
</html>
